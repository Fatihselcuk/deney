<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Deney</title>

<style>
body{
  font-family: Arial;
  background:#fff;
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:90%;
  max-width:900px;
  background:#f5f5f5;
  padding:25px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  text-align:center;
}

.hidden{display:none}

button{
  padding:12px 18px;
  margin-top:12px;
  border:none;
  background:#222;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

video{max-width:100%;border-radius:10px}

.option{text-align:left;margin:6px}
</style>
</head>

<body>

<!-- CONSENT -->
<div id="consent" class="container">
<h2>Onam Formu</h2>
<p>
Sayın katılımcı... (metnin burada kalır)
</p>

<button onclick="accept()">Katılıyorum</button>
<button onclick="decline()">Katılmıyorum</button>
</div>

<!-- DEMO -->
<div id="demo" class="container hidden">
<h2>Demografik</h2>

<input id="age" placeholder="Yaş"><br><br>

<select id="gender">
<option>Kadın</option><option>Erkek</option><option>Kuir</option>
</select>

<br><br>
<button onclick="start()">Başla</button>
</div>

<!-- VIDEO -->
<div id="videoScreen" class="container hidden">
<h3 id="vLabel"></h3>
<video id="video" controls></video>
<br>
<button onclick="toQ()">Sorular</button>
</div>

<!-- QUESTIONS -->
<div id="qScreen" class="container hidden">
<h3 id="qText"></h3>
<div id="opts"></div>
<button onclick="answer()">Cevapla</button>
</div>

<!-- SURVEY -->
<div id="survey" class="container hidden">
<h3 id="sTitle"></h3>
<div id="sBody"></div>
<button onclick="nextSurvey()">Devam</button>
</div>

<!-- END -->
<div id="end" class="container hidden">
<h2>Bitti</h2>
</div>

<script>

let group=Math.random()<0.5?"A":"B";
let vi=0, qi=0, si=0;
let start;
let data=[];

const A=["V1.mp4","V2.mp4","V3.mp4","V4.mp4","V5.mp4","V6.mp4","V7.mp4","V8.mp4","V9.mp4"];
const B=["V10.mp4","V11.mp4","V12.mp4","V13.mp4","V14.mp4","V15.mp4","V16.mp4","V17.mp4","V18.mp4"];

/* ---- MINIMAL QUESTION FIX (boş kalmasın diye placeholder) ---- */
const Q = Array(9).fill([
{q:"Soru 1",opts:["A","B","C","D"]},
{q:"Soru 2",opts:["A","B","C","D"]},
{q:"Soru 3",opts:["A","B","C","D"]}
]);

/* SURVEY FULL */
const surveys=[
{
name:"Anket 1",
items:[
"İyi nesiller yetiştirebilmek için, kadının çocuğuna bakması gerekir.",
"Kadınlar iş hayatındaki engeller ve güçlüklerle baş edebilirler."
]
},
{
name:"Anket 2",
items:[
"Evlilik, kadının çalışmasına engel olmaz.",
"Kadınlar yönetici olabilir."
]
},
{
name:"Anket 3",
items:[
"Gelecekten korkuyorum.",
"Başarısız olmaktan korkuyorum."
]
}
];

function accept(){
consent.classList.add("hidden");
demo.classList.remove("hidden");
}

function decline(){
consent.classList.add("hidden");
end.classList.remove("hidden");
}

function start(){
demo.classList.add("hidden");
videoScreen.classList.remove("hidden");
loadVideo();
}

function loadVideo(){
video.src=(group=="A"?A:B)[vi];
vLabel.innerText="Video "+(vi+1);
}

function toQ(){
videoScreen.classList.add("hidden");
qScreen.classList.remove("hidden");
qi=0;
loadQ();
}

function loadQ(){
let q=Q[vi][qi];
qText.innerText=q.q;
opts.innerHTML=q.opts.map(o=>
`<div class='option'><input type='radio' name='a' value='${o}'> ${o}</div>`
).join("");
start=Date.now();
}

function answer(){
let sel=document.querySelector("input[name='a']:checked");
if(!sel)return;

data.push(sel.value);

qi++;
if(qi<3) loadQ();
else{
vi++;
if(vi<9){
qScreen.classList.add("hidden");
videoScreen.classList.remove("hidden");
loadVideo();
}else startSurvey();
}
}

function startSurvey(){
qScreen.classList.add("hidden");
survey.classList.remove("hidden");
loadSurvey();
}

function loadSurvey(){
let s=surveys[si];
sTitle.innerText=s.name;

sBody.innerHTML=s.items.map((t,i)=>
`<p>${t}</p>
<select>
<option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
</select>`
).join("");
}

function nextSurvey(){
si++;
if(si<3) loadSurvey();
else end.classList.remove("hidden");
}

</script>

</body>
</html>
