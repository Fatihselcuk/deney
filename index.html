<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Deney</title>

<style>
body{
  font-family: Arial;
  background:#fff;
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:90%;
  max-width:900px;
  background:#f5f5f5;
  padding:25px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  text-align:center;
}

.hidden{display:none}

button{
  padding:12px 18px;
  margin-top:12px;
  border:none;
  background:#222;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

button:hover{background:#444}

video{max-width:100%;border-radius:10px}

.option{margin:6px;text-align:left}

select,input{
  width:100%;
  max-width:420px;
  padding:8px;
  margin-top:6px;
}

p{line-height:1.5}
</style>
</head>

<body>

<!-- CONSENT -->
<div id="consent" class="container">
<h2>Onam Formu</h2>
<p style="text-align:left">
Bu çalışma medya içeriklerinde kadın temsili ve bilişsel süreçleri inceler.<br><br>
Katılım gönüllüdür.
</p>

<button onclick="acceptConsent()">Katılıyorum</button>
<button onclick="declineConsent()">Katılmıyorum</button>
</div>

<!-- DEMO -->
<div id="demo" class="container hidden">
<h2>Demografik Bilgiler</h2>

<input id="age" type="number" placeholder="Yaş">

<select id="gender">
<option>Kadın</option><option>Erkek</option><option>Kuir</option><option>Belirtmek istemiyorum</option>
</select>

<select id="birth">
<option>1965-1980</option>
<option>1981-1996</option>
<option>1997-2012</option>
</select>

<select id="work">
<option>Çalışıyorum</option><option>Çalışmıyorum</option><option>Öğrenciyim</option><option>İş arıyorum</option>
</select>

<select id="edu">
<option>İlköğretim</option><option>Lise</option><option>MYO</option><option>Lisans</option><option>YL</option><option>Dr</option>
</select>

<button onclick="start()">Başla</button>
</div>

<!-- VIDEO -->
<div id="videoScreen" class="container hidden">
<h3 id="vLabel"></h3>
<video id="video" controls></video>
<button onclick="toQ()">Sorular</button>
</div>

<!-- QUESTION -->
<div id="qScreen" class="container hidden">
<h3 id="qText"></h3>
<div id="opts"></div>
<button onclick="answer()">Cevapla</button>
</div>

<!-- SURVEY -->
<div id="survey" class="container hidden">
<h3 id="sTitle"></h3>
<div id="sBody"></div>
<button onclick="nextSurvey()">Devam</button>
</div>

<!-- END -->
<div id="end" class="container hidden">
<h2>Bitti</h2>
<button onclick="download()">CSV indir</button>
</div>

<script>

let group=Math.random()<0.5?"A":"B";
let vi=0, qi=0, si=0;
let start;
let data=[];

/* VIDEOS */
const A=["V1.mp4","V2.mp4","V3.mp4","V4.mp4","V5.mp4","V6.mp4","V7.mp4","V8.mp4","V9.mp4"];
const B=["V10.mp4","V11.mp4","V12.mp4","V13.mp4","V14.mp4","V15.mp4","V16.mp4","V17.mp4","V18.mp4"];

/* QUESTIONS (kısaltılmış sabit) */
const QA = {/* senin verdiğin aynı yapı */};
const QB = QA;

/* FULL SCALES */

const surveys=[
{
name:"Anket 1",
items:[
"İyi nesiller yetiştirebilmek için, kadının çocuğuna bakması gerekir.",
"Kadınlar iş hayatındaki engeller ve güçlüklerle baş edebilirler.",
"Kadınların çalışma hayatına girmesi, erkekler arasında işsizliğe yol açacağı için sakıncalıdır.",
"Kadınlar aylık rahatsızlıkları ve doğum yapmaları nedeniyle iş hayatında verimsiz olmaktadırlar.",
"Kadınlar iş hayatında cinselliklerini ön plana çıkararak, ayrıcalık sağlamaya çalışmaktadırlar.",
"Çalışan kadının çocuğu sevgiden yoksun büyümektedir.",
"Kocası eve bakabilecek durumda olsa bile kadının çalışması gerekir.",
"Kadın-erkek birlikte çalışmada erkekler tahrik olur.",
"Kadınlar yarı zamanlı çalışmalıdır.",
"Kadınlar duygusal olduğu için sorun çözemez.",
"Kadınlar çalışmamalıdır.",
"İş ortamında gayrımeşru ilişkiler olabilir.",
"Kadının görevi ev ve çocuklardır.",
"Kadın çalışması yetenek kazandırır.",
"Kadın iş gücü kalkınmayı artırır."
]
},
{
name:"Anket 2",
items:[
"Evlilik çalışmaya engel değildir.",
"Kadın sadece ekonomik sıkıntı varsa çalışmalıdır.",
"Çalışan kadın çocuklarına zaman ayırır.",
"Kadın anne olduktan sonra çalışmamalıdır.",
"Kadın yönetici olabilir.",
"Kadın evlenince çalışmamalıdır.",
"Çalışma ev işini bozmaz.",
"Çalışan kadın daha mutludur.",
"Kadın korunmalıdır.",
"Kocası izin vermezse kadın çalışmamalıdır.",
"Kadın yönetici olabilir.",
"Geliri eşe vermelidir.",
"Çalışan kadın iyi annedir.",
"Erkek ev işi yapmalıdır.",
"Kocasız kadın eksiktir.",
"Gelir erkekten olmalıdır.",
"Kadın iş kurmamalıdır.",
"Kadının görevi evdir.",
"Kadın az kazanmalıdır.",
"Erkek reis olmalıdır.",
"Lider erkek olmalıdır.",
"Eşitlik olmalıdır.",
"Kadın karşı çıkabilmelidir.",
"Kadın küçük olmalıdır.",
"Kararı erkek verir."
]
},
{
name:"Anket 3",
items:[
"Uzun süreli sorunlardan korkuyorum.",
"Başarısızlıktan korkuyorum.",
"Hayatım kötüleşebilir.",
"Zorluklardan korkuyorum.",
"Aksiliklerden korkuyorum.",
"Kötü bir şey olacak diye düşünüyorum.",
"Gelecekten korkuyorum.",
"Maddi kaygım var.",
"Planlarım bozulabilir.",
"Gelecek belirsiz.",
"Ekonomik değişim korkutuyor.",
"Karar vermekten korkuyorum.",
"Felaket korkusu var."
]
}
];

/* FLOW */

function acceptConsent(){
consent.classList.add("hidden");
demo.classList.remove("hidden");
}
function declineConsent(){
consent.classList.add("hidden");
end.classList.remove("hidden");
}

function start(){
demo.classList.add("hidden");
videoScreen.classList.remove("hidden");
loadVideo();
}

function loadVideo(){
video.src=(group=="A"?A:B)[vi];
vLabel.innerText="Video "+(vi+1);
}

function toQ(){
videoScreen.classList.add("hidden");
qScreen.classList.remove("hidden");
qi=0;
loadQ();
}

function loadQ(){
let q=(group=="A"?QA:QB)[vi][qi];
qText.innerText=q.q;
opts.innerHTML=q.opts.map(o=>`<div class='option'><input type='radio' name='a' value='${o}'>${o}</div>`).join("");
start=Date.now();
}

function answer(){
let sel=document.querySelector("input[name='a']:checked");
if(!sel)return;

data.push({type:"q",video:vi+1,q:qi+1,ans:sel.value,rt:Date.now()-start});

qi++;
if(qi<3) loadQ();
else{
vi++;
if(vi<9){
qScreen.classList.add("hidden");
videoScreen.classList.remove("hidden");
loadVideo();
}else startSurvey();
}
}

function startSurvey(){
qScreen.classList.add("hidden");
survey.classList.remove("hidden");
loadSurvey();
}

function loadSurvey(){
let s=surveys[si];
sTitle.innerText=s.name;

sBody.innerHTML=s.items.map((it,i)=>
`<p>${it}</p>
<select id='s${i}'>
<option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
</select>`
).join("");
}

function nextSurvey(){
let s=surveys[si];
s.items.forEach((_,i)=>{
data.push({type:"s",survey:s.name,item:i+1,val:document.getElementById("s"+i).value});
});

si++;
if(si<3) loadSurvey();
else endExp();
}

function endExp(){
survey.classList.add("hidden");
end.classList.remove("hidden");
}

function download(){
let csv="type,video,q,survey,item,value,rt\n";
data.forEach(d=>{
csv+=`${d.type||""},${d.video||""},${d.q||""},${d.survey||""},${d.item||""},${d.ans||d.val||""},${d.rt||""}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="data.csv";
a.click();
}

</script>

</body>
</html>
